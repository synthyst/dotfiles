# What protocol to use when performing Git operations. Supported values: ssh, https.
git_protocol: ssh
# Prefix used by 'glab stack' when naming generated branches. Defaults to the
# $USER environment variable, falling back to 'glab-stack' when unset.
branch_prefix:
# Name of the 'git remote' that points at the GitLab repository. Used to
# resolve which remote to operate against when multiple are configured.
remote_alias:
# What editor glab should run when creating issues, merge requests, etc. This global config cannot be overridden by hostname.
editor:
# What browser glab should run when opening links. This global config cannot be overridden by hostname.
browser:
# Set your desired Markdown renderer style. Available options are [dark, light, notty]. To set a custom style, refer to https://github.com/charmbracelet/glamour#styles
glamour_style: dark
# Allow glab to automatically check for updates and notify you when there are new updates.
check_update: true
# Last update check timestamp, used for checking when the last update check was performed.
last_update_check_timestamp:
# Show a one-time post-upgrade banner pointing at 'glab whatsnew' when a new version is detected.
show_whats_new: true
# Last glab version a post-upgrade banner was shown for (automatically set).
last_seen_version: v1.100.0
# Last glab version 'glab whatsnew' rendered notes for (automatically set).
last_whatsnew_version: v1.100.0
# Show a notice when an installed agent skill (bundled or remote) has updates available.
notify_skill_updates: true
# Whether or not to display hyperlinks in terminal output. Defaults to true (enabled for TTYs). Set to false to disable. Force hyperlinks in non-TTY environments by setting FORCE_HYPERLINKS=1.
display_hyperlinks: true
# Default GitLab hostname to use.
host: gitlab.com
# Set to true (1) to disable prompts, or false (0) to enable them.
no_prompt: false
# Set to false (0) to disable sending usage data to your GitLab instance or true (1) to enable.
# See https://docs.gitlab.com/administration/settings/usage_statistics/
# for more information
telemetry: true
# Automatically run GitLab Duo CLI without prompting (true/false). Set to true to skip the confirmation prompt.
duo_cli_auto_run:
# Automatically download Duo CLI binary without prompting (true/false).
duo_cli_auto_download:
# Path to the installed Duo CLI binary (automatically set). Default: ~/.config/glab-cli/bin/duo
duo_cli_binary_path:
# Version of the installed Duo CLI binary (automatically set).
duo_cli_binary_version:
# SHA256 checksum of the installed Duo CLI binary (automatically set).
duo_cli_binary_checksum:
# Last time an update check was performed (automatically set).
duo_cli_last_update_check:
# Automatically run Orbit local CLI without prompting (true/false). Set to true to skip the confirmation prompt.
orbit_local_auto_run:
# Automatically download Orbit local CLI binary without prompting (true/false).
orbit_local_auto_download:
# Path to the installed Orbit local CLI binary (automatically set). Default: ~/.config/glab-cli/bin/orbit
orbit_local_binary_path:
# Version of the installed Orbit local CLI binary (automatically set).
orbit_local_binary_version:
# SHA256 checksum of the installed Orbit local CLI binary (automatically set).
orbit_local_binary_checksum:
# Last time an Orbit local CLI update check was performed (automatically set).
orbit_local_last_update_check:
# Configuration specific for GitLab instances.
hosts:
    gitlab.com:
        # What protocol to use to access the API endpoint. Supported values: http, https.
        api_protocol: https
        # Configure host for API endpoint. Defaults to the host itself.
        api_host: gitlab.com
        # Subfolder where GitLab is installed (e.g., 'gitlab' for https://example.com/gitlab/)
        # Use this when GitLab is hosted at a subfolder rather than domain root.
        # Supports nested paths (e.g., 'apps/gitlab' for https://example.com/apps/gitlab/)
        # Slashes are automatically trimmed, so 'gitlab', '/gitlab', and 'gitlab/' are equivalent.
        # Only applies to HTTP/HTTPS operations (API and git clone).
        subfolder:
        # Alternate hostname for SSH git operations (e.g., 'ssh.example.com' or 'git.example.com')
        # Use this when SSH uses a different hostname than HTTP/API operations.
        # Only affects SSH cloning and git operations.
        ssh_host:
        # Your GitLab access token. To get one, read https://docs.gitlab.com/user/profile/personal_access_tokens/
        token:
        # CI job token used for Job-Token authentication. Typically populated
        # automatically from CI_JOB_TOKEN when CI auto-login is enabled.
        job_token:
        # Username associated with the configured token. Set automatically on login.
        user:
        # OAuth application client ID. Required when authenticating with OAuth
        # against a self-managed GitLab instance.
        client_id:
        # Store the host's credentials in the operating system's keyring (true/false).
        # Set automatically by 'glab auth login'. Empty is treated as false.
        use_keyring:
        # Custom proxy for this host. Overrides environment proxy settings when set.
        proxy:
        # Path to a CA certificate (PEM) used to verify the GitLab server's
        # TLS certificate. Useful for self-signed or private CAs.
        ca_cert:
        # Path to a client certificate (PEM) used for mutual TLS authentication.
        client_cert:
        # Path to the private key (PEM) that matches client_cert.
        client_key:
        # Skip TLS certificate verification when talking to this host (true/false).
        # Empty is treated as false. Use only for development; do not enable in production.
        skip_tls_verify:
        # The domains of associated container registries. These are used to configure the
        # Docker credential helper.
        container_registry_domains: gitlab.com,gitlab.com:443,registry.gitlab.com
        # Custom HTTP headers to add to all HTTP requests made by glab. Supports both direct values and environment variable loading.
        # - name: Proxy-Authorization
        #   value: Bearer token123
        # - name: Cf-Access-Client-Secret
        #   valueFromEnv: MY_SECRET_VALUE
        custom_headers: []

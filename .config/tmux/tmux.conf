set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:sitm=\E[3m'
set -ga terminal-overrides ',*:Tc'   # also enables truecolor (bonus)

set -g status-position top
set -g status-justify 'absolute-centre'
set -g mode-keys vi

set -g default-shell /data/data/com.termux/files/usr/bin/zsh
set -g default-command /data/data/com.termux/files/usr/bin/zsh
  
set -g base-index 1          # windows start at 1 (not 0)
setw -g pane-base-index 1
set -g renumber-windows on   # renumber windows when one is closed

set -g history-limit 50000   # more scrollback (Termux benefits from this)

set -sg escape-time 0        # faster key response (very noticeable on mobile)
set -g repeat-time 300       # faster repeat for pane resizing etc.

set -g mouse on              # enable mouse (scroll, click panes, drag resize) — works great in Termux


set -g status-keys vi        # vi keys in status/command line

set -g status-left "" 
set -g status-right "" 

set -g prefix C-Space
unbind C-b

# Kill pane without confirmation
bind x kill-pane

set -g status-style bg=black

setw -g window-status-style fg=#dbdbff,bg=default
setw -g window-status-format " #I #W "

# Selected (current) window → italic + bold
setw -g window-status-current-style fg=#dbdbff,bg=default,bold,italics
setw -g window-status-current-format " #W "

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_text_color "#{@thm_surface_2}"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number ""
set -g @catppuccin_pane_status_enabled "yes" # set to "yes" to enable
set -g @catppuccin_pane_border_status "yes" # set to "yes" to enable
set -g @catppuccin_pane_default_fill "icon"

# Load catppuccin
run ~/dotfiles/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)

# Make the status line pretty and add some modules
set -g status-right-length 50
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
# set -agF status-right "#{E:@catppuccin_status_battery}"
# set -agF status-left "#{E:@catppuccin_status_ram}"

# this muat be last
run '~/.tmux/plugins/tpm/tpm'

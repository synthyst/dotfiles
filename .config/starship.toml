format = """$directory$git_branch$git_metrics$git_status$character"""
right_format = """$cmd_duration"""
add_newline = false

# ── Directory (italic, truncated to 3) ───────────
[directory]
truncation_length = 3
truncation_symbol = ""
style = "italic green"
format = "[$path]($style)[$read_only]($read_only_style) "

# ── Git Branch ───────────────────────────────────
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "italic purple"

# ── Git Metrics (the +added ~modified -deleted) ──
[git_metrics]
disabled = false
format = "([$added]($added_style) [$deleted]($deleted_style) )"
added_style = "italic green"
deleted_style = "italic red"
only_nonzero_diffs = true

# ── Git Status ───────────────────────────────────
[git_status]
disabled = true
format = "([$all_status$ahead_behind]($style) )"
style = "italic cyan"

# ── Prompt Character ─────────────────────────────
[character]
success_symbol = "[>=](bold green)"
error_symbol = "[<=](bold red)"

# ── Command Duration (right side) ────────────────
[cmd_duration]
min_time = 2000
format = "[ $duration]($style)"
style = "italic yellow"

[profiles]
transient = """
$directory\
$character\
"""

rtransient = """
$cmd_duration\
"""

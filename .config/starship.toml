format = """
$directory\
$git_branch\
$git_metrics\
$character
"""
right_format = """
$cmd_duration\
$git_state\
$git_status\
$all
"""
add_newline = true
continuation_prompt = '@'

# ── Directory (italic, truncated to 3) ───────────
[directory]
truncation_length = 3
truncation_symbol = ""
style = "italic fg:green bg:black"
format = "[](black)[$path]($style)[$read_only]($read_only_style)[](black)"

# ── Git Branch ───────────────────────────────────
[git_branch]
# format = "[$symbol$branch(:$remote_branch)]($style) "
format =  "[$symbol$branch]($style)[](black) "
symbol = " "
# ignore_branches = ["master", "main"]
style = "fg:purple bg:black"

# ── Git Metrics (the +added ~modified -deleted) ──
[git_metrics]
disabled = false
format = "([$added]($added_style) [$deleted]($deleted_style) )"
added_style = "green"
deleted_style = "red"
only_nonzero_diffs = true

# ── Prompt Character ─────────────────────────────
[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[](bold fg:yellow)"

# ── Command Duration (right side) ────────────────
[cmd_duration]
min_time = 2000
format = "[](black)[ $duration]($style)"
style = "fg:yellow bg:black"

[profiles]
transient = """
$directory\
$character\
"""

rtransient = """
$cmd_duration\
"""
